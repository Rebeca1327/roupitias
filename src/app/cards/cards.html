<section id="novidades" class="novidades-section">
  <div class="container">
    <h2 class="section-title">Novidades</h2>
    <p class="section-subtitle">Confira nossas peças mais recentes</p>

    <div class="carousel-wrapper">
      <div class="carousel-container" #carouselNovidades>

        <div class="product-card" *ngFor="let produto of produtos">

          <div class="product-image-wrapper">

            <img [src]="produto.imagem" [alt]="produto.nome" class="product-image" />

            <button
              class="favorite-btn"
              [class.favorited]="isFavorito(produto)"
              (click)="toggleFavorito(produto); $event.stopPropagation()">
              ❤︎
            </button>

          </div>

          <div class="product-info">

            <h3 class="product-name">{{ produto.nome }}</h3>

            <p class="product-description">{{ produto.descricao }}</p>

            <!-- TAMANHOS (AGORA NO LUGAR CERTO) -->
            <div class="size-selector">
              <button class="size-btn">PP</button>
              <button class="size-btn">P</button>
              <button class="size-btn">M</button>
              <button class="size-btn">G</button>
              <button class="size-btn">GG</button>
            </div>

            <div class="product-price">
              <span class="price">R$ {{ produto.preco.toFixed(2) }}</span>
            </div>

            <button class="buy-button" (click)="comprar(produto)">
              Comprar
            </button>

          </div>

        </div>

      </div>

      <div class="carousel-navigation">
        <button class="nav-arrow nav-left" (click)="scrollLeft('novidades')">←</button>
        <button class="nav-arrow nav-right" (click)="scrollRight('novidades')">→</button>
      </div>
    </div>
  </div>
</section>
